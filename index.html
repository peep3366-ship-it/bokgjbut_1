<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>복지카 1호 승하차 카운터</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: linear-gradient(180deg, #eff6ff 0%, #f8fafc 100%);
      color: #0f172a;
    }
    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 18px 14px 28px;
    }
    .hero {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 55%, #1e40af 100%);
      color: white;
      border-radius: 28px;
      padding: 20px 18px 18px;
      box-shadow: 0 18px 40px rgba(37, 99, 235, 0.25);
    }
    .hero-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }
    .bus-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .bus-icon {
      font-size: 32px;
      line-height: 1;
    }
    .bus-name {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .badge {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.22);
      color: rgba(255,255,255,0.96);
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .stop-order {
      opacity: 0.9;
      font-size: 13px;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .stop-name {
      font-size: 30px;
      line-height: 1.2;
      font-weight: 900;
      letter-spacing: -0.03em;
      word-break: keep-all;
      min-height: 72px;
    }
    .nav-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }
    .nav-btn {
      border: none;
      border-radius: 18px;
      padding: 14px 12px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      background: rgba(255,255,255,0.14);
      color: white;
      border: 1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(6px);
    }

    .section {
      background: white;
      border-radius: 24px;
      padding: 16px;
      margin-top: 14px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
      border: 1px solid #e2e8f0;
    }
    .section-title {
      font-size: 14px;
      color: #475569;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .ride-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .ride-btn {
      border: none;
      border-radius: 22px;
      min-height: 110px;
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -0.03em;
      cursor: pointer;
      color: white;
      box-shadow: 0 14px 24px rgba(37, 99, 235, 0.18);
    }
    .board {
      background: linear-gradient(180deg, #3b82f6 0%, #2563eb 100%);
    }
    .alight {
      background: linear-gradient(180deg, #0f172a 0%, #334155 100%);
    }

    .flag-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .flag-btn {
      border: 1.5px solid #cbd5e1;
      background: #fff;
      color: #1e3a8a;
      min-height: 64px;
      border-radius: 18px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .stat-card {
      background: linear-gradient(180deg, #f8fafc 0%, #eff6ff 100%);
      border: 1px solid #dbeafe;
      border-radius: 18px;
      padding: 14px 10px;
      text-align: center;
    }
    .stat-label {
      font-size: 12px;
      color: #64748b;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .stat-value {
      font-size: 26px;
      font-weight: 900;
      color: #0f172a;
      letter-spacing: -0.03em;
    }

    .substats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .substat-card {
      background: #ffffff;
      border: 1px dashed #bfd4ff;
      border-radius: 18px;
      padding: 14px 10px;
      text-align: center;
    }
    .substat-label {
      font-size: 12px;
      color: #1d4ed8;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .substat-value {
      font-size: 22px;
      font-weight: 900;
      color: #1e3a8a;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .tool-btn {
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #0f172a;
      border-radius: 16px;
      padding: 13px 10px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .history-wrap {
      max-height: 280px;
      overflow: auto;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      background: #fff;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      font-size: 13px;
      padding: 10px 12px;
      border-bottom: 1px solid #eef2f7;
      text-align: left;
      white-space: nowrap;
    }
    th {
      position: sticky;
      top: 0;
      background: #f8fafc;
      color: #334155;
      font-weight: 800;
      z-index: 1;
    }
    .empty {
      padding: 26px 12px;
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
      font-weight: 700;
    }
    .note {
      margin-top: 12px;
      font-size: 12px;
      color: #64748b;
      line-height: 1.5;
      text-align: center;
    }

    button:active { transform: scale(0.985); }

    @media (max-width: 380px) {
      .stop-name { font-size: 26px; }
      .ride-btn { min-height: 96px; font-size: 26px; }
      .flag-btn { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <div class="hero-top">
        <div class="bus-wrap">
          <div class="bus-icon">🚌</div>
          <div class="bus-name">복지카 1호</div>
        </div>
        <div class="badge">버튼형 간편 집계</div>
      </div>

      <div class="stop-order" id="stopOrder">1 / 22 정류장</div>
      <div class="stop-name" id="stopName"></div>

      <div class="nav-row">
        <button class="nav-btn" onclick="prevStop()">← 이전 정류장</button>
        <button class="nav-btn" onclick="nextStop()">다음 정류장 →</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">승하차 기록</div>
      <div class="ride-grid">
        <button class="ride-btn board" onclick="addRide('승차')">승차</button>
        <button class="ride-btn alight" onclick="addRide('하차')">하차</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">하루 총 인원 보조 집계</div>
      <div class="flag-grid">
        <button class="flag-btn" onclick="addFlag('임산부')">임산부</button>
        <button class="flag-btn" onclick="addFlag('장애인')">장애인</button>
        <button class="flag-btn" onclick="addFlag('동행인')">동행인</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">오늘 승하차</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">승차</div>
          <div class="stat-value" id="todayBoard">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">하차</div>
          <div class="stat-value" id="todayAlight">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">총합</div>
          <div class="stat-value" id="todayTotal">0</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">오늘 보조 집계</div>
      <div class="substats-grid">
        <div class="substat-card">
          <div class="substat-label">임산부</div>
          <div class="substat-value" id="todayPregnant">0</div>
        </div>
        <div class="substat-card">
          <div class="substat-label">장애인</div>
          <div class="substat-value" id="todayDisabled">0</div>
        </div>
        <div class="substat-card">
          <div class="substat-label">동행인</div>
          <div class="substat-value" id="todayCompanion">0</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">기록 관리</div>
      <div class="toolbar">
        <button class="tool-btn" onclick="downloadCSV()">CSV 다운로드</button>
        <button class="tool-btn" onclick="downloadTodayCSV()">오늘 기록만 다운로드</button>
        <button class="tool-btn" onclick="undoLastRide()">최근 승하차 취소</button>
        <button class="tool-btn" onclick="undoLastFlag()">최근 보조집계 취소</button>
        <button class="tool-btn" onclick="resetToday()">오늘 기록 초기화</button>
        <button class="tool-btn" onclick="resetAll()">전체 초기화</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">최근 승하차 기록</div>
      <div class="history-wrap">
        <table>
          <thead>
            <tr>
              <th>일시</th>
              <th>정류장</th>
              <th>구분</th>
            </tr>
          </thead>
          <tbody id="historyBody"></tbody>
        </table>
      </div>
      <div class="note">
        임산부 · 장애인 · 동행인 버튼은 정류장과 연결되지 않고 하루 총계만 따로 올라갑니다.
      </div>
    </div>
  </div>

  <script>
    const STOPS = [
      "동작구보건소·건강관리청(기점)",
      "동작구청 신청사",
      "신상도초등학교",
      "반올림피자·GS편의점",
      "약수도서관(앞)",
      "현대하이츠",
      "대양주택",
      "성주파크빌라",
      "모건빌라",
      "신상도교회",
      "삼익아파트입구",
      "건영약수맨션",
      "약수경로당",
      "상도2동 경로당",
      "상도역",
      "상도1동 주민센터",
      "상도전통시장 새마을금고",
      "상도종합사회복지관",
      "상도은빛어르신복지관·동작가족센터",
      "김영삼도서관",
      "상도2동 주민센터",
      "동작구보건소·건강관리청(종점)"
    ];

    const STORAGE_RIDES = "bus_counter_rides_ui_refresh_v1";
    const STORAGE_FLAGS = "bus_counter_flags_ui_refresh_v1";
    const STORAGE_INDEX = "bus_counter_index_ui_refresh_v1";

    function getRides() {
      try {
        const raw = localStorage.getItem(STORAGE_RIDES);
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        return [];
      }
    }
    function saveRides(v) { localStorage.setItem(STORAGE_RIDES, JSON.stringify(v)); }

    function getFlags() {
      try {
        const raw = localStorage.getItem(STORAGE_FLAGS);
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        return [];
      }
    }
    function saveFlags(v) { localStorage.setItem(STORAGE_FLAGS, JSON.stringify(v)); }

    function getIndex() {
      const raw = localStorage.getItem(STORAGE_INDEX);
      const idx = raw === null ? 0 : Number(raw);
      if (Number.isNaN(idx) || idx < 0 || idx >= STOPS.length) return 0;
      return idx;
    }
    function saveIndex(v) { localStorage.setItem(STORAGE_INDEX, String(v)); }

    function pad(n) { return String(n).padStart(2, "0"); }
    function formatDateTime(d) {
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }
    function formatDateOnly(d) {
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    }
    function todayString() { return formatDateOnly(new Date()); }

    function prevStop() {
      let idx = getIndex();
      idx = (idx - 1 + STOPS.length) % STOPS.length;
      saveIndex(idx);
      render();
    }
    function nextStop() {
      let idx = getIndex();
      idx = (idx + 1) % STOPS.length;
      saveIndex(idx);
      render();
    }

    function addRide(type) {
      const now = new Date();
      const rides = getRides();
      rides.unshift({
        id: `${Date.now()}_${Math.random().toString(36).slice(2,8)}`,
        datetime: formatDateTime(now),
        date: formatDateOnly(now),
        stop: STOPS[getIndex()],
        type
      });
      saveRides(rides);
      render();
    }

    function addFlag(category) {
      const now = new Date();
      const flags = getFlags();
      flags.unshift({
        id: `${Date.now()}_${Math.random().toString(36).slice(2,8)}`,
        datetime: formatDateTime(now),
        date: formatDateOnly(now),
        category
      });
      saveFlags(flags);
      render();
    }

    function undoLastRide() {
      const rides = getRides();
      if (!rides.length) return alert("취소할 승하차 기록이 없습니다.");
      const removed = rides.shift();
      saveRides(rides);
      alert(`최근 승하차 1건 취소: ${removed.stop} / ${removed.type}`);
      render();
    }

    function undoLastFlag() {
      const flags = getFlags();
      if (!flags.length) return alert("취소할 보조 집계 기록이 없습니다.");
      const removed = flags.shift();
      saveFlags(flags);
      alert(`최근 보조 집계 1건 취소: ${removed.category}`);
      render();
    }

    function getTodayRideTotals(rides) {
      const today = todayString();
      const todayRecords = rides.filter(r => r.date === today);
      const board = todayRecords.filter(r => r.type === "승차").length;
      const alight = todayRecords.filter(r => r.type === "하차").length;
      return { board, alight, total: todayRecords.length };
    }

    function getTodayFlagTotals(flags) {
      const today = todayString();
      const t = flags.filter(r => r.date === today);
      return {
        pregnant: t.filter(r => r.category === "임산부").length,
        disabled: t.filter(r => r.category === "장애인").length,
        companion: t.filter(r => r.category === "동행인").length
      };
    }

    function render() {
      const idx = getIndex();
      const rides = getRides();
      const flags = getFlags();
      const rideTotals = getTodayRideTotals(rides);
      const flagTotals = getTodayFlagTotals(flags);

      document.getElementById("stopOrder").textContent = `${idx + 1} / ${STOPS.length} 정류장`;
      document.getElementById("stopName").textContent = STOPS[idx];
      document.getElementById("todayBoard").textContent = rideTotals.board;
      document.getElementById("todayAlight").textContent = rideTotals.alight;
      document.getElementById("todayTotal").textContent = rideTotals.total;
      document.getElementById("todayPregnant").textContent = flagTotals.pregnant;
      document.getElementById("todayDisabled").textContent = flagTotals.disabled;
      document.getElementById("todayCompanion").textContent = flagTotals.companion;

      const body = document.getElementById("historyBody");
      if (!rides.length) {
        body.innerHTML = `<tr><td colspan="3" class="empty">아직 승하차 기록이 없습니다.</td></tr>`;
      } else {
        body.innerHTML = rides.slice(0, 200).map(r => `
          <tr>
            <td>${r.datetime}</td>
            <td>${r.stop}</td>
            <td>${r.type}</td>
          </tr>
        `).join("");
      }
    }

    function escapeCSV(value) {
      const str = String(value ?? "");
      return '"' + str.replace(/"/g, '""') + '"';
    }

    function makeCSV(rides, flags) {
      const rideTotals = getTodayRideTotals(rides);
      const flagTotals = getTodayFlagTotals(flags);

      let csv = "\uFEFF";
      csv += "전체요약\r\n";
      csv += "항목,건수\r\n";
      csv += `${escapeCSV("오늘 승차")},${rideTotals.board}\r\n`;
      csv += `${escapeCSV("오늘 하차")},${rideTotals.alight}\r\n`;
      csv += `${escapeCSV("오늘 총합")},${rideTotals.total}\r\n`;
      csv += `${escapeCSV("오늘 임산부")},${flagTotals.pregnant}\r\n`;
      csv += `${escapeCSV("오늘 장애인")},${flagTotals.disabled}\r\n`;
      csv += `${escapeCSV("오늘 동행인")},${flagTotals.companion}\r\n\r\n`;

      csv += "승하차기록\r\n";
      csv += "일시,날짜,정류장명,구분\r\n";
      rides.forEach(r => {
        csv += `${escapeCSV(r.datetime)},${escapeCSV(r.date)},${escapeCSV(r.stop)},${escapeCSV(r.type)}\r\n`;
      });
      csv += "\r\n";

      csv += "보조집계기록\r\n";
      csv += "일시,날짜,구분\r\n";
      flags.forEach(r => {
        csv += `${escapeCSV(r.datetime)},${escapeCSV(r.date)},${escapeCSV(r.category)}\r\n`;
      });

      return csv;
    }

    function saveBlob(filename, text) {
      const blob = new Blob([text], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function downloadCSV() {
      saveBlob("복지카1호_UI개선_전체기록.csv", makeCSV(getRides(), getFlags()));
    }

    function downloadTodayCSV() {
      const today = todayString();
      const rides = getRides().filter(r => r.date === today);
      const flags = getFlags().filter(r => r.date === today);
      saveBlob(`복지카1호_UI개선_오늘기록_${today}.csv`, makeCSV(rides, flags));
    }

    function resetToday() {
      if (!confirm("오늘 기록만 초기화할까요?")) return;
      const today = todayString();
      saveRides(getRides().filter(r => r.date !== today));
      saveFlags(getFlags().filter(r => r.date !== today));
      render();
    }

    function resetAll() {
      if (!confirm("전체 기록을 초기화할까요?")) return;
      localStorage.removeItem(STORAGE_RIDES);
      localStorage.removeItem(STORAGE_FLAGS);
      render();
    }

    render();
  </script>
</body>
</html>
